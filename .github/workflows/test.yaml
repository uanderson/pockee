name: Test
on:
  - push
  - pull_request

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    container: golang:latest
    steps:
      - name: Get code
        uses: actions/checkout@v3
      - name: Get dependencies
        run: go mod download
      - name: Test
        run: go test -v ./...