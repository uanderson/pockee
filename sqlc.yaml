version: 2

sql:
  - schema: "./.sqlc/contact/schema.sql"
    queries: "./.sqlc/contact/queries.sql"
    engine: "postgresql"
    gen:
      go:
        package: dao
        out: "contact/dao"
        emit_empty_slices: true
        output_db_file_name: "dao.go"
        sql_package: "pgx/v4"
        emit_interface: true
        emit_prepared_queries: true

  - schema: "./.sqlc/exchange/schema.sql"
    queries: "./.sqlc/exchange/queries.sql"
    engine: "postgresql"
    gen:
      go:
        package: dao
        out: "exchange/dao"
        emit_empty_slices: true
        output_db_file_name: "dao.go"
        sql_package: "pgx/v4"
        emit_interface: true
        emit_prepared_queries: true

  - schema: "./.sqlc/setting/schema.sql"
    queries: "./.sqlc/setting/queries.sql"
    engine: "postgresql"
    gen:
      go:
        package: dao
        out: "setting/dao"
        emit_empty_slices: true
        output_db_file_name: "dao.go"
        sql_package: "pgx/v4"
        emit_interface: true
        emit_prepared_queries: true

overrides:
  go:
    rename:
      bank_id: "BankId"
      contact_id: "ContactId"
      id: "Id"
      tax_id: "TaxId"
      user_id: "UserId"
