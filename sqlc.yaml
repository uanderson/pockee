version: 2

sql:
  - schema: "./.sqlc/account/schema.sql"
    queries: "./.sqlc/account/queries.sql"
    engine: "postgresql"
    gen:
      go:
        package: dao
        out: "account/dao"
        emit_empty_slices: true
        output_db_file_name: "dao.go"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_prepared_queries: true

