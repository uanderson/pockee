version: 2

sql:
  - schema: "./.sqlc/exchange/schema.sql"
    queries: "./.sqlc/exchange/queries.sql"
    engine: "postgresql"
    gen:
      go:
        package: dao
        out: "exchange/dao"
        emit_empty_slices: true
        output_db_file_name: "dao.go"
        sql_package: "pgx/v4"
        emit_interface: true
        emit_prepared_queries: true

overrides:
  go:
    rename:
      id: "Id"